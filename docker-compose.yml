services:
  web:
    image: php:8.1-apache
    container_name: hanthane-app
    ports:
      - "8080:80"
    environment:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT}
    volumes:
      - .:/var/www/html
      - ./apache.conf:/etc/apache2/sites-available/000-default.conf
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db
    networks:
      - hanthane-network
    command: >
      bash -c "
        docker-php-ext-install pdo_mysql &&
        a2enmod rewrite &&
        apache2-foreground
      "

  db:
    image: mysql:8.0
    container_name: hanthane-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hanthane_db
      MYSQL_USER: hanthane_user
      MYSQL_PASSWORD: hanthane_pass
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./DB/DB.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./DB/migrations/2025_11_17_group_post_columns.sql:/docker-entrypoint-initdb.d/02-group_post_columns.sql
      - ./DB/migrations/2026_04_10_password_reset_codes.sql:/docker-entrypoint-initdb.d/03-password_reset_codes.sql
    networks:
      - hanthane-network
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: hanthane-pma
    restart: always
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: rootpassword
      UPLOAD_LIMIT: 64M
    ports:
      - "8081:80"
    depends_on:
      - db
    networks:
      - hanthane-network
    volumes:
      - ./themes/pma/blueberry:/var/www/html/themes/blueberry

volumes:
  db_data:

networks:
  hanthane-network:
    driver: bridge